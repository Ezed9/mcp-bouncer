# Curated pack: filesystem MCP server (e.g. @modelcontextprotocol/server-filesystem).
# Tool/param names verified live against the reference server's tools/list on
# 2026-07-06 (see bouncer/docs/manual-smoke.md). The reference server exposes NO
# delete tool, so `delete_file` was removed. Mutating tools kept below.
write_file:
  write_params: [path]
  allowed_path_prefixes: []      # left open; users set their own in bouncer.yaml
edit_file:
  write_params: [path]
  allowed_path_prefixes: []
create_directory:
  write_params: [path]
  allowed_path_prefixes: []
move_file:
  write_params: [source, destination]
  allowed_path_prefixes: []
